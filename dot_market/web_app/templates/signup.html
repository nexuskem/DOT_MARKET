<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — DOT MARKET</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-dot {
      display: inline-block;
      width: 14px;
      height: 14px;
      background: var(--accent-blue);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent-blue);
      margin-right: 10px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-input {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--text-mono);
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: var(--transition);
    }
    .form-input:focus {
      border-color: var(--accent-blue);
      box-shadow: var(--shadow-glow-blue);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      margin-top: 12px;
      margin-bottom: 12px;
    }
    .error-msg {
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid var(--accent-red);
      color: var(--accent-red);
      padding: 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 20px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-logo">
      <div class="login-dot"></div><span class="login-logo-text">DOT MARKET</span>
    </div>

    <div class="card">
      <div class="card-title" style="justify-content: center; margin-bottom: 24px;">
        <span class="icon">✨</span> Create Account
      </div>

      {% if error %}
      <div class="error-msg">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/signup">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" placeholder="Choose a username" autofocus required />
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="••••••••" required />
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="confirm" class="form-input" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn-primary btn-login">Sign Up</button>
      </form>

      <div style="text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-muted);">
        Already have an account? <a href="/login" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Log In</a>
      </div>

    </div>
    
  </div>

</body>
</html>
